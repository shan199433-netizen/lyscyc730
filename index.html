<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="browser-tab-title">艾姍的微甜生活 APP</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8A7A80">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="微甜生活">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NaikaiFont';
            src: url(https://cdn.jsdelivr.net/gh/max32002/naikaifont@1.0/webfont/NaikaiFont-Regular-Lite.woff2) format("woff2");
            font-display: swap;
        }
        :root, [data-theme="mauve"] {
            --c-bg: #F8F5F5; --c-text: #4A3E43; --c-border: #E1D9D9; --c-accent: #8A7A80;
            --c-accent-dark: #796A70; --c-text-muted: #8C7E83; --c-border-strong: #D5C9C9;
            --c-card-alt: #EAE1E1; --c-label: #6B5E63; --c-list-bg: #F9F6F6;
        }
        [data-theme="lavender"] {
            --c-bg: #F6EAF3; --c-text: #4A3E52; --c-border: #E4D6E9; --c-accent: #B4A9D2;
            --c-accent-dark: #A88DC0; --c-text-muted: #A88DC0; --c-border-strong: #CDC7E3;
            --c-card-alt: #E4D6E9; --c-label: #A88DC0; --c-list-bg: #F6EAF3;
        }
        [data-theme="plumjam"] {
            --c-bg: #F5E0DF; --c-text: #303030; --c-border: #E9B9C5; --c-accent: #DC7090;
            --c-accent-dark: #303030; --c-text-muted: #DC7090; --c-border-strong: #E9B9C5;
            --c-card-alt: #E9B9C5; --c-label: #DC7090; --c-list-bg: #F5E0DF;
        }
        [data-theme="iceblue"] {
            --c-bg: #B3D2EE; --c-text: #4B6775; --c-border: #86ACC3; --c-accent: #7790AC;
            --c-accent-dark: #4B6775; --c-text-muted: #7790AC; --c-border-strong: #86ACC3;
            --c-card-alt: #86ACC3; --c-label: #4B6775; --c-list-bg: #D9E9F7;
        }
        [data-theme="mocha"] {
            --c-bg: #F3E9E3; --c-text: #4A3E38; --c-border: #D7CEC7; --c-accent: #9C8B79;
            --c-accent-dark: #6E5F4E; --c-text-muted: #9C9090; --c-border-strong: #9C9090;
            --c-card-alt: #D7CEC7; --c-label: #9C9090; --c-list-bg: #F3E9E3;
        }
        [data-theme="cloudmilk"] {
            --c-bg: #F5EEEE; --c-text: #3A3A3A; --c-border: #DBDBDB; --c-accent: #A7A3A2;
            --c-accent-dark: #6B6B6B; --c-text-muted: #8B8B8B; --c-border-strong: #A7A3A2;
            --c-card-alt: #DBDBDB; --c-label: #8B8B8B; --c-list-bg: #F5EEEE;
        }
        html { font-size: 116%; }
        body {
            font-family: 'NaikaiFont', 'Noto Sans TC', sans-serif; background-color: var(--c-bg); color: var(--c-text);
            -webkit-tap-highlight-color: transparent; margin: 0; padding: 0;
            transition: background-color .3s ease, color .3s ease;
            font-variant-numeric: tabular-nums; letter-spacing: 0.01em;
        }
        h1, h2, h3 { font-family: 'NaikaiFont', 'Noto Sans TC', sans-serif; letter-spacing: 0.02em; }
        input, select, textarea { font-size: 16px !important; font-family: 'NaikaiFont', 'Noto Sans TC', sans-serif; }
        button { font-family: 'NaikaiFont', 'Noto Sans TC', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn .35s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }
        @keyframes popIn { 0% { transform: scale(.85); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }
        .nav-btn.active-nav i { animation: popIn .3s ease; }
        .nav-btn { padding: 6px 14px; border-radius: 14px; transition: background-color .25s ease, color .2s ease; }
        .nav-btn.active-nav { background: var(--c-card-alt); }
        .theme-swatch { transition: transform .15s ease; }
        .theme-swatch:active { transform: scale(0.9); }
        .theme-swatch.selected .swatch-circle { box-shadow: 0 0 0 3px white, 0 0 0 5px var(--c-accent); }
        button, .btn-pop { transition: transform .12s ease; }
        button:active, .btn-pop:active { transform: scale(0.97); }
        .shadow-sm { box-shadow: 0 2px 14px rgba(74,62,67,0.06), 0 1px 3px rgba(74,62,67,0.05) !important; }
        .shadow-lg { box-shadow: 0 6px 24px rgba(74,62,67,0.09), 0 2px 6px rgba(74,62,67,0.06) !important; }
        header { padding-top: calc(1rem + env(safe-area-inset-top)) !important; }
        nav { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)) !important; }
        #app { padding-bottom: calc(8rem + env(safe-area-inset-bottom)) !important; }
    </style>
</head>
<body class="bg-[var(--c-bg)]" data-theme="mauve">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-[var(--c-bg)] shadow-lg relative flex flex-col" style="background: linear-gradient(180deg, var(--c-card-alt) 0%, var(--c-bg) 220px);">
        
        <header class="bg-white px-5 py-4 border-b border-[var(--c-border)] flex items-center justify-between sticky top-0 z-30 shadow-sm relative overflow-hidden">
            <div class="flex items-center space-x-3">
                <div class="w-11 h-11 rounded-full border-2 border-[var(--c-border-strong)] overflow-hidden bg-gray-100 flex items-center justify-center relative shadow-sm">
                    <img id="app-avatar-img" src="" class="w-full h-full object-cover hidden">
                    <i id="app-avatar-icon" class="fa-solid fa-dog text-lg text-[var(--c-accent)]"></i>
                </div>
                <div>
                    <h1 id="app-title-display" class="font-semibold text-base text-[var(--c-text)]">艾姍的微甜生活 APP</h1>
                </div>
            </div>
            <div id="sync-indicator" class="text-[10px] px-2 py-1 rounded bg-amber-100 text-amber-700 font-bold animate-pulse">☁️ 連線中</div>
        </header>


        <main class="flex-1 p-5 z-10">
            
            <div id="tab-jars" class="tab-content active space-y-4">
                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm">
                    <label class="block text-xs font-bold text-[var(--c-text-muted)] mb-1">本月個人預估總收入 (NT$)</label>
                    <input type="number" id="total-income" value="80000" class="w-full text-xl font-bold p-2 border rounded border-[var(--c-border)] focus:outline-none focus:border-[var(--c-accent)]" oninput="calcJars()">
                    <div class="flex items-center justify-between mt-1.5">
                        <p class="text-[10px] text-amber-600 font-medium">🔒 可自訂屬於自己的六帳戶分配%數，另一半看不到唷</p>
                        <span id="pct-sum-indicator" class="text-[10px] font-bold whitespace-nowrap ml-2"></span>
                    </div>
                </div>
                <div id="jars-container" class="space-y-4"></div>
            </div>

            <div id="tab-bills" class="tab-content space-y-4">
                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <h2 class="font-bold text-sm text-[var(--c-text)] flex items-center"><i class="fa-solid fa-pen-to-square mr-2 text-[var(--c-accent)]"></i>新增雙人開銷</h2>
                    <input type="text" id="bill-desc" placeholder="項目說明（如：買保健食品、7月基金）" class="w-full p-2 text-sm border rounded border-[var(--c-border)] focus:outline-none">
                    <input type="number" id="bill-amount" placeholder="金額 (NT$)" class="w-full p-2 text-sm border rounded border-[var(--c-border)] focus:outline-none">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[11px] text-[var(--c-text-muted)] font-bold mb-1">誰先掏錢代墊？</label>
                            <select id="bill-payer" class="w-full p-2 text-xs border rounded border-[var(--c-border)] bg-white"></select>
                        </div>
                        <div>
                            <label class="block text-[11px] text-[var(--c-text-muted)] font-bold mb-1">這筆錢怎麼分？</label>
                            <select id="bill-split-type" class="w-full p-2 text-xs border rounded border-[var(--c-border)] bg-white">
                                <option value="half">👥 共同花費</option>
                                <option value="full">👤 幫對方買</option>
                            </select>
                        </div>
                    </div>
                    
                    <button onclick="addBill()" class="w-full py-2.5 bg-[var(--c-accent)] hover:bg-[var(--c-accent-dark)] text-white rounded-xl text-sm font-bold transition shadow-sm">送出記帳 (秒同步☁️)</button>
                </div>

                <div class="bg-[var(--c-card-alt)] p-4 rounded-2xl border border-[var(--c-border-strong)] text-center shadow-sm">
                    <h3 class="text-xs font-bold text-[var(--c-label)] uppercase tracking-wider mb-1">雙人即時對帳計算機</h3>
                    <p id="bill-status-text" class="text-sm font-bold text-[var(--c-text)]">雲端帳目載入中...</p>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-sm text-[var(--c-text)]">近期共同帳目明細</h3>
                        <button onclick="clearAllBills()" class="text-xs text-red-500 hover:underline"><i class="fa-solid fa-trash-can mr-1"></i>清除全部</button>
                    </div>
                    <div id="bills-list" class="space-y-2 max-h-64 overflow-y-auto no-scrollbar text-sm"></div>
                </div>
            </div>

            <div id="tab-chores" class="tab-content space-y-4">
                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] text-center shadow-sm">
                    <h2 class="font-bold text-sm mb-3 text-[var(--c-text)]"><i class="fa-solid fa-trophy mr-2 text-amber-500"></i>雲端家務點數爭霸賽</h2>
                    <div class="flex justify-around items-center border-t border-b border-gray-100 py-3">
                        <div class="text-center">
                            <p class="text-xs text-[var(--c-text-muted)] font-bold" id="chore-name-a-label">成員 A</p>
                            <p id="score-a" class="text-3xl font-black text-[var(--c-accent)] mt-1">0</p>
                        </div>
                        <div class="w-px h-8 bg-gray-200"></div>
                        <div class="text-center">
                            <p class="text-xs text-[var(--c-text-muted)] font-bold" id="chore-name-b-label">成員 B</p>
                            <p id="score-b" class="text-3xl font-black text-[var(--c-accent)] mt-1">0</p>
                        </div>
                    </div>
                    <button onclick="resetChoresScore()" class="text-xs text-gray-400 hover:text-gray-600 mt-2 block mx-auto underline">點數重新歸零</button>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <details class="group" open>
                        <summary class="flex items-center justify-between cursor-pointer list-none select-none">
                            <span class="font-bold text-sm text-[var(--c-text)]"><i class="fa-solid fa-circle-check mr-2 text-green-500"></i>點擊完成工作 (積分換獎勵 ⚡️)</span>
                            <i class="fa-solid fa-chevron-down text-xs text-gray-300 transition-transform group-open:rotate-180"></i>
                        </summary>
                        <div id="chores-list" class="space-y-2 max-h-72 overflow-y-auto no-scrollbar pt-3"></div>
                    </details>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <details class="group">
                        <summary class="flex items-center justify-between cursor-pointer list-none select-none">
                            <span class="font-bold text-sm text-[var(--c-text)]"><i class="fa-solid fa-list-check mr-2 text-[var(--c-accent)]"></i>新增/管理家務項目</span>
                            <i class="fa-solid fa-chevron-down text-xs text-gray-300 transition-transform group-open:rotate-180"></i>
                        </summary>
                        <div class="space-y-2 pt-3">
                            <div class="grid grid-cols-3 gap-2">
                                <input type="text" id="chore-new-name" placeholder="家務名稱（如：擦窗戶 🪟）" class="col-span-2 w-full p-2 text-sm border rounded border-[var(--c-border)]">
                                <input type="number" id="chore-new-pts" placeholder="點數" value="1" class="w-full p-2 text-sm border rounded border-[var(--c-border)]">
                            </div>
                            <button onclick="addChore()" class="w-full py-2 bg-[var(--c-accent)] text-white rounded-xl text-xs font-bold transition">➕ 新增家務項目</button>
                            <p class="text-[10px] text-[var(--c-text-muted)]">上方清單裡每個項目後面都有 ✏️ 修改 / 🗑️ 刪除 按鈕，可自由調整。</p>
                        </div>
                    </details>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <h2 class="font-bold text-sm text-[var(--c-text)] border-b pb-2"><i class="fa-solid fa-gift mr-2 text-pink-400"></i>獎勵兌換商店 (兩端秒同步)</h2>
                    <div id="rewards-list" class="space-y-2 max-h-72 overflow-y-auto no-scrollbar"></div>
                    <details class="group border-t border-[var(--c-border)] pt-2">
                        <summary class="flex items-center justify-between cursor-pointer list-none py-1 select-none">
                            <span class="text-xs font-bold text-[var(--c-text-muted)]">➕ 新增獎勵項目</span>
                            <i class="fa-solid fa-chevron-down text-xs text-gray-300 transition-transform group-open:rotate-180"></i>
                        </summary>
                        <div class="space-y-2 pt-2">
                            <div class="grid grid-cols-3 gap-2">
                                <input type="text" id="reward-new-name" placeholder="獎勵內容（如：按摩10分鐘 💆）" class="col-span-2 w-full p-2 text-sm border rounded border-[var(--c-border)]">
                                <input type="number" id="reward-new-cost" placeholder="點數" value="8" class="w-full p-2 text-sm border rounded border-[var(--c-border)]">
                            </div>
                            <button onclick="addReward()" class="w-full py-2 bg-[var(--c-accent)] text-white rounded-xl text-xs font-bold transition">加入獎勵商店</button>
                        </div>
                    </details>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <details class="group">
                        <summary class="flex items-center justify-between cursor-pointer list-none select-none">
                            <span class="font-bold text-sm text-[var(--c-text)]"><i class="fa-solid fa-clock-rotate-left mr-2 text-[var(--c-accent)]"></i>兌換紀錄</span>
                            <i class="fa-solid fa-chevron-down text-xs text-gray-300 transition-transform group-open:rotate-180"></i>
                        </summary>
                        <div id="redeem-log" class="space-y-1.5 pt-3 max-h-48 overflow-y-auto no-scrollbar text-xs"></div>
                    </details>
                </div>
            </div>

            <div id="tab-settings" class="tab-content space-y-4">

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <h2 class="font-bold text-sm text-[var(--c-text)] border-b pb-2"><i class="fa-solid fa-user-gear mr-2 text-[var(--c-accent)]"></i>共同基本設定 (兩端秒同步)</h2>
                    <div>
                        <label class="block text-xs text-[var(--c-text-muted)] mb-1 font-bold">共同 APP 大標題</label>
                        <input type="text" id="setting-app-title" class="w-full p-2 text-sm border rounded border-[var(--c-border)]">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-[var(--c-text-muted)] mb-1 font-bold">成員 A 暱稱</label>
                            <input type="text" id="setting-name-a" class="w-full p-2 text-sm border rounded border-[var(--c-border)]">
                        </div>
                        <div>
                            <label class="block text-xs text-[var(--c-text-muted)] mb-1 font-bold">成員 B 暱稱</label>
                            <input type="text" id="setting-name-b" class="w-full p-2 text-sm border rounded border-[var(--c-border)]">
                        </div>
                    </div>
                    <button onclick="saveCloudSettings()" class="w-full py-2.5 bg-[var(--c-accent)] text-white rounded-xl text-sm font-bold hover:bg-[var(--c-accent-dark)] transition">儲存基本設定 (雙向同步 ☁️)</button>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <h2 class="font-bold text-sm text-[var(--c-text)] border-b pb-2"><i class="fa-solid fa-wand-magic-sparkles mr-2 text-[var(--c-accent)]"></i>個人化設定（本機獨立）</h2>

                    <details class="group">
                        <summary class="flex items-center justify-between cursor-pointer list-none py-1 select-none">
                            <span class="text-xs font-bold text-[var(--c-text-muted)]"><i class="fa-solid fa-palette mr-1.5 text-[var(--c-accent)]"></i>外觀主題色彩 🎨</span>
                            <span class="flex items-center space-x-2">
                                <span id="current-theme-dot" class="w-5 h-5 rounded-full border border-black/10 inline-block" style="background: linear-gradient(135deg, #F9F6F6, #8A7A80);"></span>
                                <i class="fa-solid fa-chevron-down text-xs text-gray-300 transition-transform group-open:rotate-180"></i>
                            </span>
                        </summary>
                        <div class="grid grid-cols-3 gap-3 pt-3" id="theme-swatch-list">
                            <button onclick="applyTheme('mauve')" data-theme-btn="mauve" class="theme-swatch flex flex-col items-center space-y-1">
                                <span class="swatch-circle w-12 h-12 rounded-full block border border-black/10" style="background: linear-gradient(135deg, #F9F6F6, #E1D9D9, #D5C9C9, #8A7A80, #796A70);"></span>
                                <span class="text-[10px] text-[var(--c-text-muted)]">藕粉霧</span>
                            </button>
                            <button onclick="applyTheme('lavender')" data-theme-btn="lavender" class="theme-swatch flex flex-col items-center space-y-1">
                                <span class="swatch-circle w-12 h-12 rounded-full block border border-black/10" style="background: linear-gradient(135deg, #F6EAF3, #E4D6E9, #CDC7E3, #B4A9D2, #A88DC0);"></span>
                                <span class="text-[10px] text-[var(--c-text-muted)]">薰衣草紫</span>
                            </button>
                            <button onclick="applyTheme('plumjam')" data-theme-btn="plumjam" class="theme-swatch flex flex-col items-center space-y-1">
                                <span class="swatch-circle w-12 h-12 rounded-full block border border-black/10" style="background: linear-gradient(135deg, #F5E0DF, #E9B9C5, #DC7090, #303030);"></span>
                                <span class="text-[10px] text-[var(--c-text-muted)]">梅子果醬</span>
                            </button>
                            <button onclick="applyTheme('iceblue')" data-theme-btn="iceblue" class="theme-swatch flex flex-col items-center space-y-1">
                                <span class="swatch-circle w-12 h-12 rounded-full block border border-black/10" style="background: linear-gradient(135deg, #B3D2EE, #86ACC3, #7790AC, #4B6775);"></span>
                                <span class="text-[10px] text-[var(--c-text-muted)]">冰藍玫瑰</span>
                            </button>
                            <button onclick="applyTheme('mocha')" data-theme-btn="mocha" class="theme-swatch flex flex-col items-center space-y-1">
                                <span class="swatch-circle w-12 h-12 rounded-full block border border-black/10" style="background: linear-gradient(135deg, #F3E9E3, #D7CEC7, #9C9090, #9C8B79);"></span>
                                <span class="text-[10px] text-[var(--c-text-muted)]">摩卡杏仁</span>
                            </button>
                            <button onclick="applyTheme('cloudmilk')" data-theme-btn="cloudmilk" class="theme-swatch flex flex-col items-center space-y-1">
                                <span class="swatch-circle w-12 h-12 rounded-full block border border-black/10" style="background: linear-gradient(135deg, #F5EEEE, #DBDBDB, #A7A3A2, #8B8B8B);"></span>
                                <span class="text-[10px] text-[var(--c-text-muted)]">雲霧奶蓋</span>
                            </button>
                        </div>
                    </details>

                    <div class="border-t border-[var(--c-border)] pt-3 space-y-2">
                        <label class="block text-xs text-[var(--c-text-muted)] font-bold"><i class="fa-solid fa-image mr-1.5 text-[var(--c-accent)]"></i>自訂個人頭像照片</label>
                        <input type="file" id="setting-avatar-file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-200">
                        <button onclick="saveAvatarOnly()" class="w-full py-2 bg-[var(--c-accent)] text-white rounded-xl text-xs font-bold transition">儲存照片頭像</button>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <h2 class="font-bold text-sm text-[var(--c-text)] border-b pb-2"><i class="fa-solid fa-percentage mr-2 text-[var(--c-accent)]"></i>個人六帳戶百分比 (%) 調配自訂</h2>
                    <div class="grid grid-cols-2 gap-3 text-xs">
                        <div>
                            <label class="block text-[var(--c-text-muted)] font-bold mb-1">🏠 生活必需 (%)</label>
                            <input type="number" id="pct-nec" class="w-full p-1.5 border rounded">
                        </div>
                        <div>
                            <label class="block text-[var(--c-text-muted)] font-bold mb-1">📈 財務自由 (%)</label>
                            <input type="number" id="pct-ffa" class="w-full p-1.5 border rounded">
                        </div>
                        <div>
                            <label class="block text-[var(--c-text-muted)] font-bold mb-1">🥐 盡情玩樂 (%)</label>
                            <input type="number" id="pct-play" class="w-full p-1.5 border rounded">
                        </div>
                        <div>
                            <label class="block text-[var(--c-text-muted)] font-bold mb-1">🏖️ 長期儲蓄 (%)</label>
                            <input type="number" id="pct-ltss" class="w-full p-1.5 border rounded">
                        </div>
                        <div>
                            <label class="block text-[var(--c-text-muted)] font-bold mb-1">📚 教育成長 (%)</label>
                            <input type="number" id="pct-edu" class="w-full p-1.5 border rounded">
                        </div>
                        <div>
                            <label class="block text-[var(--c-text-muted)] font-bold mb-1">💖 貢獻付出 (%)</label>
                            <input type="number" id="pct-give" class="w-full p-1.5 border rounded">
                        </div>
                    </div>
                    <button onclick="saveLocalPcts()" class="w-full py-2 bg-gray-700 hover:bg-gray-800 text-white rounded-xl text-xs font-bold transition">💾 儲存並更新個人預算比例</button>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm space-y-3">
                    <h2 class="font-bold text-sm text-[var(--c-text)] border-b pb-2"><i class="fa-solid fa-folder-plus mr-2 text-[var(--c-accent)]"></i>個人六帳戶細項管理 (本機獨立)</h2>
                    <div class="space-y-2">
                        <label class="block text-xs text-[var(--c-text-muted)] font-bold">選擇歸屬大分類</label>
                        <select id="manage-jar-select" class="w-full p-2 text-sm border rounded border-[var(--c-border)] bg-white" onchange="renderLocalJarItems()">
                            <option value="nec">🏠 生活必需</option>
                            <option value="ffa">📈 財務自由</option>
                            <option value="play">🥐 盡情玩樂</option>
                            <option value="ltss">🏖️ 長期儲蓄</option>
                            <option value="edu">📚 教育成長</option>
                            <option value="give">💖 貢獻付出</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="manage-item-name" placeholder="細項" class="w-full p-2 text-sm border rounded border-[var(--c-border)]">
                            <input type="number" id="manage-item-cost" placeholder="金額" class="w-full p-2 text-sm border rounded border-[var(--c-border)]">
                        </div>
                        <button onclick="addLocalJarItem()" class="w-full py-2 bg-[var(--c-accent)] text-white rounded-xl text-xs font-bold transition">加入我的個人預算盤</button>
                    </div>
                    <div id="manage-jar-items-list" class="space-y-1 text-xs border-t pt-2 max-h-48 overflow-y-auto no-scrollbar"></div>
                </div>
            </div>
        </main>

        <nav class="bg-white border-t border-[var(--c-border)] fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around py-3 z-50 shadow-lg">
            <button onclick="switchTab('jars')" id="nav-jars" class="nav-btn active-nav text-xs text-[var(--c-accent)] font-bold flex flex-col items-center space-y-1"><i class="fa-solid fa-chart-pie text-lg"></i><span>預算沙盤</span></button>
            <button onclick="switchTab('bills')" id="nav-bills" class="nav-btn text-xs text-gray-400 flex flex-col items-center space-y-1"><i class="fa-solid fa-receipt text-lg"></i><span>雙人記帳</span></button>
            <button onclick="switchTab('chores')" id="nav-chores" class="nav-btn text-xs text-gray-400 flex flex-col items-center space-y-1"><i class="fa-solid fa-broom text-lg"></i><span>家務對抗</span></button>
            <button onclick="switchTab('settings')" id="nav-settings" class="nav-btn text-xs text-gray-400 flex flex-col items-center space-y-1"><i class="fa-solid fa-gear text-lg"></i><span>設定</span></button>
        </nav>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCApWrIpF-dWtD-ocG4oYtnakLCajX37-Y",
            authDomain: "lyscyc730.firebaseapp.com",
            databaseURL: "https://lyscyc730-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lyscyc730",
            storageBucket: "lyscyc730.firebasestorage.app",
            messagingSenderId: "402069817592",
            appId: "1:402069817592:web:b3ca4c3edebe522849930d"
        };
        firebase.initializeApp(firebaseConfig);
        // 專屬於你們兩人的雲端房間代號（不易被猜到）
        const db = firebase.database().ref("room_x7k2q9v_shanshan_yunchen");

        let localState = JSON.parse(localStorage.getItem('shanshan_local_v70')) || {
            income: 80000, avatar: "", theme: "mauve",
            pcts: { nec: 55, ffa: 10, play: 10, ltss: 10, edu: 10, give: 5 },
            jarItems: { nec: [], ffa: [], play: [], ltss: [], edu: [], give: [] }
        };
        if (!localState.theme) localState.theme = "mauve";

        let cloudState = {
            appTitle: "艾姍的微甜生活 APP", nameA: "姍姍", nameB: "昀辰",
            bills: [], scoreA: 0, scoreB: 0,
            chores: [
                { name: "洗碗盤 🍽️", pts: 1 }, { name: "倒垃圾/廚餘 🗑️", pts: 1 },
                { name: "洗衣服/曬衣服 🧺", pts: 2 }, { name: "吸地拖地 ✨", pts: 2 },
                { name: "清理狗大便/尿尿 🐾", pts: 1 }
            ],
            rewards: [
                { name: "按摩 10 分鐘 💆", cost: 8 },
                { name: "指定一部電影一起看 🎬", cost: 10 },
                { name: "對方洗碗一整週 🍽️", cost: 15 }
            ],
            redeemLog: []
        };

        function saveLocal() { localStorage.setItem('shanshan_local_v70', JSON.stringify(localState)); }

        const themeGradients = {
            mauve: "linear-gradient(135deg, #F9F6F6, #E1D9D9, #D5C9C9, #8A7A80, #796A70)",
            lavender: "linear-gradient(135deg, #F6EAF3, #E4D6E9, #CDC7E3, #B4A9D2, #A88DC0)",
            plumjam: "linear-gradient(135deg, #F5E0DF, #E9B9C5, #DC7090, #303030)",
            iceblue: "linear-gradient(135deg, #B3D2EE, #86ACC3, #7790AC, #4B6775)",
            mocha: "linear-gradient(135deg, #F3E9E3, #D7CEC7, #9C9090, #9C8B79)",
            cloudmilk: "linear-gradient(135deg, #F5EEEE, #DBDBDB, #A7A3A2, #8B8B8B)"
        };
        function applyTheme(themeName) {
            localState.theme = themeName;
            saveLocal();
            document.body.setAttribute('data-theme', themeName);
            document.querySelectorAll('[data-theme-btn]').forEach(btn => {
                btn.classList.toggle('selected', btn.getAttribute('data-theme-btn') === themeName);
            });
            const dot = document.getElementById('current-theme-dot');
            if (dot && themeGradients[themeName]) dot.style.background = themeGradients[themeName];
        }

        // 雲端實時監聽
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) { 
                if(!data.appTitle) data.appTitle = "艾姍的微甜生活 APP";
                if(!data.nameA) data.nameA = "姍姍";
                if(!data.nameB) data.nameB = "昀辰";
                cloudState = data; 
            } else { 
                db.set(cloudState); 
            }
            // 連線成功！立刻定格為好看的綠色，徹底告別閃爍！
            const indicator = document.getElementById('sync-indicator');
            if(indicator) {
                indicator.className = "text-[10px] px-2 py-1 rounded bg-green-100 text-green-700 font-bold";
                indicator.innerText = "☁️ 雲端同步中";
            }
            applyDisplay();
        }, (error) => {
            console.error("Firebase連線失敗：", error);
        });

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            ['jars', 'bills', 'chores', 'settings'].forEach(t => {
                const btn = document.getElementById('nav-' + t);
                if (t === tabId) { btn.classList.replace('text-gray-400', 'text-[var(--c-accent)]'); btn.classList.add('font-bold', 'active-nav'); }
                else { btn.classList.replace('text-[var(--c-accent)]', 'text-gray-400'); btn.classList.remove('font-bold', 'active-nav'); }
            });
            if(tabId === 'settings') renderLocalJarItems();
            window.scrollTo(0, 0);
        }

        const jarOpenState = {};
        function calcJars() {
            const inc = document.getElementById('total-income').value || 0;
            localState.income = Number(inc); saveLocal();
            const p = localState.pcts;
            const pctSum = (p.nec||0)+(p.ffa||0)+(p.play||0)+(p.ltss||0)+(p.edu||0)+(p.give||0);
            const sumEl = document.getElementById('pct-sum-indicator');
            if (sumEl) {
                if (pctSum === 100) {
                    sumEl.className = "text-[10px] font-bold whitespace-nowrap ml-2 text-emerald-600";
                    sumEl.innerHTML = "分配總和 100% ✅";
                } else {
                    sumEl.className = "text-[10px] font-bold whitespace-nowrap ml-2 text-red-500";
                    sumEl.innerHTML = `⚠️ 分配總和 ${pctSum}%（${pctSum > 100 ? '超過' : '未滿'} 100%）`;
                }
            }
            const jarConfigs = [
                { id: 'nec', name: '🏠 生活必需', pct: (p.nec || 0) / 100 }, { id: 'ffa', name: '📈 財務自由', pct: (p.ffa || 0) / 100 },
                { id: 'play', name: '🥐 盡情玩樂', pct: (p.play || 0) / 100 }, { id: 'ltss', name: '🏖️ 長期儲蓄', pct: (p.ltss || 0) / 100 },
                { id: 'edu', name: '📚 教育成長', pct: (p.edu || 0) / 100 }, { id: 'give', name: '💖 貢獻付出', pct: (p.give || 0) / 100 }
            ];
            const container = document.getElementById('jars-container'); container.innerHTML = '';
            jarConfigs.forEach(config => {
                const totalBudget = Math.round(inc * config.pct);
                const items = localState.jarItems[config.id] || [];
                const spentSum = items.reduce((sum, item) => sum + item.cost, 0); const remain = totalBudget - spentSum;
                let itemsHtml = '';
                items.forEach(item => { itemsHtml += `<div class="flex justify-between text-xs text-gray-500 border-b border-dashed border-gray-100 py-1 pl-4"><span>• ${item.name}</span><span>NT$ ${item.cost.toLocaleString()}</span></div>`; });
                if(items.length === 0) itemsHtml = `<p class="text-[11px] text-gray-400 italic pl-4">目前暫無設定子開銷項目</p>`;
                const usedPct = totalBudget > 0 ? Math.min((spentSum / totalBudget) * 100, 100) : (spentSum > 0 ? 100 : 0);
                const isOver = spentSum > totalBudget;
                const barColor = isOver ? '#EF4444' : (usedPct >= 85 ? '#F59E0B' : 'var(--c-accent)');
                const isOpen = jarOpenState[config.id] ? ' open' : '';
                const jarDiv = document.createElement('div'); jarDiv.className = "bg-white p-4 rounded-2xl border border-[var(--c-border)] shadow-sm";
                jarDiv.innerHTML = `<details class="group"${isOpen}><summary class="cursor-pointer list-none select-none"><div class="flex justify-between items-center pb-1 border-b border-gray-100"><span class="font-bold text-sm text-[var(--c-text)]">${config.name} (${(config.pct*100).toFixed(0)}%)</span><span class="flex items-center space-x-2"><span class="text-xs font-bold text-gray-400">總預算: NT$ ${totalBudget.toLocaleString()}</span><i class="fa-solid fa-chevron-down text-xs text-gray-300 transition-transform group-open:rotate-180"></i></span></div></summary><div class="space-y-1 pt-2">${itemsHtml}</div></details><div class="mt-2 h-1.5 rounded-full bg-gray-100 overflow-hidden"><div class="h-full rounded-full transition-all duration-500" style="width:${usedPct}%; background:${barColor};"></div></div><div class="flex justify-between items-center text-xs pt-1.5 font-medium"><span class="text-gray-400">已規劃扣除: NT$ ${spentSum.toLocaleString()}</span><span class="${remain >= 0 ? 'text-emerald-600' : 'text-red-500'} font-bold">可用剩餘: NT$ ${remain.toLocaleString()}</span></div>`;
                const detailsEl = jarDiv.querySelector('details');
                detailsEl.addEventListener('toggle', () => { jarOpenState[config.id] = detailsEl.open; });
                container.appendChild(jarDiv);
            });
        }

        function saveLocalPcts() {
            localState.pcts = {
                nec: Number(document.getElementById('pct-nec').value) || 0, ffa: Number(document.getElementById('pct-ffa').value) || 0,
                play: Number(document.getElementById('pct-play').value) || 0, ltss: Number(document.getElementById('pct-ltss').value) || 0,
                edu: Number(document.getElementById('pct-edu').value) || 0, give: Number(document.getElementById('pct-give').value) || 0
            };
            saveLocal(); calcJars(); alert("個人理財百分比更新成功！");
        }

        function renderLocalJarItems() {
            const jarId = document.getElementById('manage-jar-select').value;
            const container = document.getElementById('manage-jar-items-list'); container.innerHTML = '';
            const items = localState.jarItems[jarId] || [];
            items.forEach((item, index) => {
                const div = document.createElement('div'); div.className = "flex justify-between items-center p-1.5 bg-gray-50 rounded mb-1 text-gray-700";
                div.innerHTML = `<span>${item.name} (NT$ ${item.cost.toLocaleString()})</span><button onclick="deleteLocalJarItem('${jarId}', ${index})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>`;
                container.appendChild(div);
            });
        }

        function addLocalJarItem() {
            const jarId = document.getElementById('manage-jar-select').value; const name = document.getElementById('manage-item-name').value.trim(); const cost = Number(document.getElementById('manage-item-cost').value);
            if(!name || !cost || cost <= 0) return alert("請填寫細項與金額！");
            if(!localState.jarItems[jarId]) localState.jarItems[jarId] = []; localState.jarItems[jarId].push({ name, cost });
            saveLocal(); calcJars(); renderLocalJarItems(); document.getElementById('manage-item-name').value = ''; document.getElementById('manage-item-cost').value = '';
        }
        function deleteLocalJarItem(jarId, index) { localState.jarItems[jarId].splice(index, 1); saveLocal(); calcJars(); renderLocalJarItems(); }

        function renderBills() {
            const listEl = document.getElementById('bills-list'); listEl.innerHTML = ''; 
            let netOwedToA = 0; 
            const billsArr = cloudState.bills || [];
            
            billsArr.forEach((bill, index) => {
                const amount = Number(bill.amount) || 0;
                const splitType = bill.splitType || 'half'; 
                let textType = '';
                
                if (bill.payer === 'A') {
                    if (splitType === 'half') { netOwedToA += (amount / 2); textType = '👥 共同平分'; }
                    else { netOwedToA += amount; textType = '👤 幫對方全額代墊'; }
                } else {
                    if (splitType === 'half') { netOwedToA -= (amount / 2); textType = '👥 共同平分'; }
                    else { netOwedToA -= amount; textType = '👤 幫對方全額代墊'; }
                }

                const payerLabel = bill.payer === 'A' ? cloudState.nameA : cloudState.nameB;
                const div = document.createElement('div'); div.className = "flex justify-between items-center p-2.5 bg-[var(--c-list-bg)] rounded-2xl border border-gray-100";
                div.innerHTML = `<div><p class="font-bold text-[var(--c-text)]">${bill.desc} <span class="text-[10px] bg-white border px-1 py-0.5 rounded text-gray-500 ml-1 font-normal">${textType}</span></p><p class="text-[10px] text-[var(--c-text-muted)]">${payerLabel} 先墊了 NT$ ${amount.toLocaleString()}</p></div><div class="flex items-center space-x-2"><span class="font-extrabold text-[var(--c-accent)]">NT$ ${amount.toLocaleString()}</span><button onclick="deleteBill(${index})" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-circle-xmark text-base"></i></button></div>`;
                listEl.appendChild(div);
            });
            
            const statusTextEl = document.getElementById('bill-status-text');
            if (netOwedToA > 0) {
                statusTextEl.innerHTML = `👉 <span class="text-red-500 font-extrabold">${cloudState.nameB}</span> 應補給 <span class="text-emerald-600 font-extrabold">${cloudState.nameA}</span> <span class="text-lg font-black">NT$ ${Math.round(netOwedToA).toLocaleString()}</span>`;
            } else if (netOwedToA < 0) {
                statusTextEl.innerHTML = `👉 <span class="text-red-500 font-extrabold">${cloudState.nameA}</span> 應補給 <span class="text-emerald-600 font-extrabold">${cloudState.nameB}</span> <span class="text-lg font-black">NT$ ${Math.round(Math.abs(netOwedToA)).toLocaleString()}</span>`;
            } else {
                statusTextEl.innerHTML = "🎉 帳目目前完全平分，誰也不欠誰！";
            }
        }

        function addBill() {
            const desc = document.getElementById('bill-desc').value.trim(); 
            const amount = Number(document.getElementById('bill-amount').value); 
            const payer = document.getElementById('bill-payer').value;
            const splitType = document.getElementById('bill-split-type').value;
            
            if (!desc || !amount || amount <= 0) return alert("請填寫項目與金額！"); 
            if(!cloudState.bills) cloudState.bills = []; 
            cloudState.bills.unshift({ desc, amount, payer, splitType }); 
            db.set(cloudState);
            document.getElementById('bill-desc').value = ''; 
            document.getElementById('bill-amount').value = '';
        }
        function deleteBill(index) { cloudState.bills.splice(index, 1); db.set(cloudState); }
        function clearAllBills() { if (confirm("確定一鍵清空所有雲端記帳？")) { cloudState.bills = []; db.set(cloudState); } }

        function renderChores() {
            document.getElementById('score-a').innerText = cloudState.scoreA || 0; document.getElementById('score-b').innerText = cloudState.scoreB || 0;
            const listEl = document.getElementById('chores-list'); listEl.innerHTML = ''; const choresArr = cloudState.chores || [];
            choresArr.forEach((chore, index) => {
                const itemDiv = document.createElement('div'); itemDiv.className = "p-2.5 bg-[var(--c-list-bg)] rounded-2xl border border-gray-100 shadow-sm space-y-2";
                itemDiv.innerHTML = `<div class="flex items-center justify-between"><span class="font-bold text-sm text-gray-700">${chore.name}</span><span class="text-xs text-[var(--c-accent)] bg-white px-1.5 py-0.5 rounded-md border border-gray-200">+${chore.pts} 點</span></div><div class="flex items-center justify-between"><div class="flex items-center space-x-1.5"><button onclick="addChorePoints('A', ${chore.pts})" class="px-2.5 py-1 bg-white hover:bg-gray-100 text-xs font-bold rounded-xl border text-gray-700 shadow-sm">${cloudState.nameA}</button><button onclick="addChorePoints('B', ${chore.pts})" class="px-2.5 py-1 bg-[var(--c-accent)] hover:bg-[var(--c-accent-dark)] text-xs font-bold rounded-xl text-white shadow-sm">${cloudState.nameB}</button></div><div class="flex items-center space-x-2"><button onclick="editChore(${index})" class="text-gray-300 hover:text-[var(--c-accent)] px-1"><i class="fa-solid fa-pen text-xs"></i></button><button onclick="deleteChore(${index})" class="text-gray-300 hover:text-red-500 px-1"><i class="fa-solid fa-trash-can text-xs"></i></button></div></div>`;
                listEl.appendChild(itemDiv);
            });
            renderRewards();
        }

        function renderRewards() {
            const listEl = document.getElementById('rewards-list'); if (!listEl) return;
            listEl.innerHTML = '';
            const rewardsArr = cloudState.rewards || [];
            if (rewardsArr.length === 0) {
                listEl.innerHTML = '<p class="text-xs text-gray-400 text-center py-2">還沒有獎勵，從下方「新增獎勵項目」加入第一個吧 🎁</p>';
            }
            rewardsArr.forEach((reward, index) => {
                const canA = (cloudState.scoreA || 0) >= reward.cost;
                const canB = (cloudState.scoreB || 0) >= reward.cost;
                const itemDiv = document.createElement('div'); itemDiv.className = "p-2.5 bg-[var(--c-list-bg)] rounded-2xl border border-gray-100 shadow-sm space-y-2";
                itemDiv.innerHTML = `<div class="flex items-center justify-between"><span class="font-bold text-sm text-gray-700">${reward.name}</span><span class="text-xs text-pink-500 bg-white px-1.5 py-0.5 rounded-md border border-pink-200 font-bold">${reward.cost} 點</span></div><div class="flex items-center justify-between"><div class="flex items-center space-x-1.5"><button onclick="redeemReward(${index}, 'A')" ${canA ? '' : 'disabled'} class="px-2.5 py-1 text-xs font-bold rounded-xl border shadow-sm ${canA ? 'bg-white hover:bg-pink-50 text-gray-700' : 'bg-gray-50 text-gray-300 cursor-not-allowed'}">${cloudState.nameA} 兌換</button><button onclick="redeemReward(${index}, 'B')" ${canB ? '' : 'disabled'} class="px-2.5 py-1 text-xs font-bold rounded-xl shadow-sm ${canB ? 'bg-pink-400 hover:bg-pink-500 text-white' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}">${cloudState.nameB} 兌換</button></div><div class="flex items-center space-x-2"><button onclick="editReward(${index})" class="text-gray-300 hover:text-[var(--c-accent)] px-1"><i class="fa-solid fa-pen text-xs"></i></button><button onclick="deleteReward(${index})" class="text-gray-300 hover:text-red-500 px-1"><i class="fa-solid fa-trash-can text-xs"></i></button></div></div>`;
                listEl.appendChild(itemDiv);
            });
            const logEl = document.getElementById('redeem-log');
            if (logEl) {
                const log = cloudState.redeemLog || [];
                logEl.innerHTML = log.length === 0
                    ? '<p class="text-gray-400 text-center py-1">還沒有人兌換過獎勵</p>'
                    : log.map(entry => `<div class="flex justify-between items-center p-2 bg-[var(--c-list-bg)] rounded-xl"><span>🎁 <b>${entry.who}</b> 兌換了「${entry.what}」</span><span class="text-gray-400 whitespace-nowrap ml-2">-${entry.cost}點 · ${entry.date}</span></div>`).join('');
            }
        }

        function redeemReward(index, member) {
            const reward = cloudState.rewards[index];
            const who = member === 'A' ? cloudState.nameA : cloudState.nameB;
            const score = member === 'A' ? (cloudState.scoreA || 0) : (cloudState.scoreB || 0);
            if (score < reward.cost) return alert("點數不夠喔！繼續加油做家務 💪");
            if (!confirm(`${who} 要用 ${reward.cost} 點兌換「${reward.name}」嗎？`)) return;
            if (member === 'A') cloudState.scoreA = score - reward.cost; else cloudState.scoreB = score - reward.cost;
            if (!cloudState.redeemLog) cloudState.redeemLog = [];
            const now = new Date();
            cloudState.redeemLog.unshift({ who, what: reward.name, cost: reward.cost, date: `${now.getMonth()+1}/${now.getDate()}` });
            if (cloudState.redeemLog.length > 30) cloudState.redeemLog = cloudState.redeemLog.slice(0, 30);
            db.set(cloudState);
            alert(`兌換成功 🎉 記得跟對方領取「${reward.name}」！`);
        }

        function addReward() {
            const nameInput = document.getElementById('reward-new-name');
            const costInput = document.getElementById('reward-new-cost');
            const name = nameInput.value.trim();
            const cost = Number(costInput.value) || 1;
            if (!name) return alert("請輸入獎勵內容！");
            if (!cloudState.rewards) cloudState.rewards = [];
            cloudState.rewards.push({ name, cost });
            db.set(cloudState);
            nameInput.value = ''; costInput.value = '8';
        }
        function deleteReward(index) { if (confirm("確定刪除這個獎勵？")) { cloudState.rewards.splice(index, 1); db.set(cloudState); } }
        function editReward(index) {
            const reward = cloudState.rewards[index];
            const newName = prompt("修改獎勵內容：", reward.name);
            if (newName === null) return;
            const newCost = prompt("修改所需點數：", reward.cost);
            if (newCost === null) return;
            cloudState.rewards[index] = { name: newName.trim() || reward.name, cost: Number(newCost) || reward.cost };
            db.set(cloudState);
        }

        function addChore() {
            const nameInput = document.getElementById('chore-new-name');
            const ptsInput = document.getElementById('chore-new-pts');
            const name = nameInput.value.trim();
            const pts = Number(ptsInput.value) || 1;
            if (!name) return alert("請輸入家務名稱！");
            if (!cloudState.chores) cloudState.chores = [];
            cloudState.chores.push({ name, pts });
            db.set(cloudState);
            nameInput.value = ''; ptsInput.value = '1';
        }
        function deleteChore(index) { if (confirm("確定刪除這個家務項目？")) { cloudState.chores.splice(index, 1); db.set(cloudState); } }
        function editChore(index) {
            const chore = cloudState.chores[index];
            const newName = prompt("修改家務名稱：", chore.name);
            if (newName === null) return;
            const newPts = prompt("修改完成點數：", chore.pts);
            if (newPts === null) return;
            cloudState.chores[index] = { name: newName.trim() || chore.name, pts: Number(newPts) || chore.pts };
            db.set(cloudState);
        }

        function addChorePoints(m, p) { 
            if(m==='A') cloudState.scoreA=(cloudState.scoreA||0)+p; else cloudState.scoreB=(cloudState.scoreB||0)+p; 
            db.set(cloudState); 
        }
        function resetChoresScore() { if(confirm("分數歸零？")) { cloudState.scoreA=0; cloudState.scoreB=0; db.set(cloudState); } }

        function saveCloudSettings() {
            const title = document.getElementById('setting-app-title').value.trim();
            const nA = document.getElementById('setting-name-a').value.trim();
            const nB = document.getElementById('setting-name-b').value.trim();
            if(!title || !nA || !nB) return alert("名稱和標題不可留空！");
            
            cloudState.appTitle = title;
            cloudState.nameA = nA;
            cloudState.nameB = nB;
            
            db.set(cloudState).then(() => {
                alert("雲端暱稱與大標題同步更新成功！🌟");
            });
        }

        function saveAvatarOnly() {
            const fileInput = document.getElementById('setting-avatar-file');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader(); reader.onload = function(e) { localState.avatar = e.target.result; saveLocal(); applyDisplay(); alert("頭像儲存成功！"); }; reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function applyDisplay() {
            document.getElementById('app-title-display').innerText = cloudState.appTitle;
            document.getElementById('browser-tab-title').innerText = cloudState.appTitle;
            document.getElementById('chore-name-a-label').innerText = cloudState.nameA;
            document.getElementById('chore-name-b-label').innerText = cloudState.nameB;
            
            document.getElementById('setting-app-title').value = cloudState.appTitle;
            document.getElementById('setting-name-a').value = cloudState.nameA;
            document.getElementById('setting-name-b').value = cloudState.nameB;
            
            const p = localState.pcts;
            document.getElementById('pct-nec').value = p.nec; document.getElementById('pct-ffa').value = p.ffa; document.getElementById('pct-play').value = p.play; document.getElementById('pct-ltss').value = p.ltss; document.getElementById('pct-edu').value = p.edu; document.getElementById('pct-give').value = p.give;
            const imgEl = document.getElementById('app-avatar-img'); const iconEl = document.getElementById('app-avatar-icon');
            if (localState.avatar) { imgEl.src = localState.avatar; imgEl.classList.remove('hidden'); iconEl.classList.add('hidden'); }
            else { imgEl.classList.add('hidden'); iconEl.classList.remove('hidden'); }
            
            const selectPayer = document.getElementById('bill-payer'); 
            if(selectPayer) {
                selectPayer.innerHTML = `<option value="A">由 ${cloudState.nameA} 代墊</option><option value="B">由 ${cloudState.nameB} 代墊</option>`;
            }
            calcJars(); renderBills(); renderChores();
        }
        document.getElementById('total-income').value = localState.income; calcJars();
        applyTheme(localState.theme || 'mauve');
    </script>
</body>
</html>
